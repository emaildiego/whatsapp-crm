<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="WA CRM"/>
  <meta name="theme-color" content="#6366f1"/>
  <link rel="manifest" href="manifest.json"/>
  <title>WhatsApp CRM</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#0f172a;color:#f1f5f9;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
    input,textarea,button{font-family:inherit}
    ::-webkit-scrollbar{display:none}
    #app{display:flex;flex-direction:column;height:100dvh}
    #header{background:#1e293b;border-bottom:1px solid #334155;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    .logo{display:flex;align-items:center;gap:8px}
    .logo-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#6366f1,#25D366);display:flex;align-items:center;justify-content:center;font-size:14px}
    .logo-title{font-weight:700;font-size:14px}
    .logo-sub{font-size:10px;color:#64748b}
    .nav{display:flex;gap:6px}
    .nav-btn{border-radius:7px;padding:5px 12px;cursor:pointer;font-size:11px;font-weight:600;border:1px solid #334155;background:transparent;color:#94a3b8}
    .nav-btn.active{background:#6366f1;border-color:#6366f1;color:#fff}
    #body{flex:1;overflow-y:auto;padding:12px 14px;padding-bottom:calc(12px + env(safe-area-inset-bottom))}
    .contact-wrap{border-radius:12px;overflow:hidden;border:1px solid #1e293b;margin-bottom:6px;transition:border-color 0.2s}
    .contact-wrap.open{border-color:#6366f1}
    .contact-row{background:#1e293b;padding:10px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
    .avatar{width:33px;height:33px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;transition:background 0.2s}
    .contact-wrap.open .avatar{background:#6366f1}
    .row-info{flex:1;min-width:0}
    .row-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
    .row-sub{font-size:11px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
    .row-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .dot{width:7px;height:7px;border-radius:50%}
    .days-label{font-size:10px;color:#475569}
    .chevron{font-size:10px;color:#475569;transition:transform 0.2s;display:inline-block}
    .contact-wrap.open .chevron{transform:rotate(180deg)}
    .tag{font-size:9px;padding:1px 6px;border-radius:20px;font-weight:700}
    .expand{background:#131f30;border-top:1px solid #1e293b;padding:13px 14px}
    .section-label{font-size:10px;color:#475569;font-weight:700;letter-spacing:.5px;margin-bottom:5px}
    .tags-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
    .tag-btn{font-size:10px;padding:3px 9px;border-radius:20px;cursor:pointer;font-weight:700;border:1px solid #334155;background:transparent;color:#475569;transition:all 0.15s}
    .note-box{background:#1e293b;border-radius:8px;padding:8px 10px;font-size:12px;color:#475569;font-style:italic;cursor:text;min-height:34px;margin-bottom:12px}
    .note-box.has-note{color:#94a3b8}
    textarea.note-edit{width:100%;background:#1e293b;border:1px solid #6366f1;border-radius:8px;color:#f1f5f9;padding:8px 10px;font-size:12px;resize:vertical;min-height:60px;outline:none;margin-bottom:6px}
    .btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:0}
    .btn{border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:600;transition:opacity 0.15s}
    .btn:disabled{opacity:0.5}
    .btn-ai{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;flex:1;min-width:120px}
    .btn-contacted{background:#22c55e22;border:1px solid #22c55e44 !important;color:#22c55e}
    .btn-delete{background:#ef444411;border:1px solid #ef444433 !important;color:#ef4444}
    .btn-save{background:#6366f1;color:#fff}
    .btn-cancel{background:#1e293b;color:#64748b}
    .msg-box{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px;margin-top:12px}
    .msg-label{font-size:10px;color:#6366f1;font-weight:700;margin-bottom:6px}
    textarea.msg-edit{width:100%;background:transparent;border:none;color:#cbd5e1;font-size:12px;line-height:1.6;resize:vertical;outline:none;min-height:70px}
    .btn-wa{background:#25D366;color:#fff;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-weight:700;font-size:12px;display:flex;align-items:center;gap:6px;margin-top:7px}
    .form-card{background:#1e293b;border:1px solid #6366f1;border-radius:12px;padding:16px;margin-bottom:12px}
    .form-title{font-weight:700;font-size:12px;color:#a5b4fc;margin-bottom:12px}
    .form-field{margin-bottom:8px}
    .form-label{font-size:10px;color:#64748b;margin-bottom:3px}
    input.form-input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:7px;padding:7px 10px;color:#f1f5f9;font-size:12px;outline:none}
    .search-row{display:flex;gap:8px;margin-bottom:12px}
    input.search{flex:1;background:#1e293b;border:1px solid #334155;border-radius:9px;padding:8px 12px;color:#f1f5f9;font-size:12px;outline:none}
    .btn-add{background:#6366f1;border:none;color:#fff;border-radius:9px;padding:8px 14px;cursor:pointer;font-weight:700;font-size:16px}
    .btn-import{background:#25D36622;border:1px solid #25D36644;color:#25D366;border-radius:9px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
    .dash-title{font-size:13px;font-weight:700;margin-bottom:2px}
    .dash-sub{font-size:11px;color:#475569;margin-bottom:14px}
    .section-header{display:flex;align-items:center;gap:6px;margin-bottom:8px}
    .section-header span{font-size:10px;font-weight:700;letter-spacing:1px}
    .empty{text-align:center;padding:40px;color:#334155;font-size:13px}
    #settings-panel{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:14px}
    #settings-panel h3{font-size:13px;font-weight:700;margin-bottom:4px}
    #settings-panel p{font-size:11px;color:#64748b;margin-bottom:10px;line-height:1.6}
    #settings-panel a{color:#6366f1}
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">
      <div class="logo-icon">💬</div>
      <div>
        <div class="logo-title">WhatsApp CRM</div>
        <div class="logo-sub" id="contact-count">0 contacts</div>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn active" onclick="setView('dashboard')">Dashboard</button>
      <button class="nav-btn" onclick="setView('contacts')">Contacts</button>
      <button class="nav-btn" onclick="setView('settings')">⚙</button>
    </div>
  </div>
  <div id="body"></div>
</div>

<script>
const STORE='wa-crm-v2';
const TAG_COLORS={key:'#8b5cf6',work:'#3b82f6',friend:'#ec4899',family:'#f59e0b',client:'#06b6d4',mentor:'#10b981'};
let contacts=JSON.parse(localStorage.getItem(STORE)||'null')||[
  {id:1,name:'Sarah Johnson',phone:'+14155552671',tags:['work','key'],lastNote:'Just got promoted to VP of Marketing',lastContact:'2026-02-01',reminderDays:30},
  {id:2,name:'Mike Chen',phone:'+14155559823',tags:['friend','key'],lastNote:'Training for his first marathon in April',lastContact:'2026-01-15',reminderDays:30},
];
let expanded=null,messages={},currentView='dashboard',editingNote=null,showForm=false,search='';
let apiKey=localStorage.getItem('wa-crm-apikey')||'';
let notifPermission=localStorage.getItem('wa-notif')||'default';
let formTags=[];

function save(){localStorage.setItem(STORE,JSON.stringify(contacts));document.getElementById('contact-count').textContent=contacts.length+' contacts';}
function daysAgo(d){if(!d)return 999;return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
function dotColor(days,limit){if(days>=limit)return'#ef4444';if(days>=limit*0.75)return'#f59e0b';return'#22c55e';}
function tagChip(t){const c=TAG_COLORS[t]||'#475569';return`<span class="tag" style="background:${c}33;color:${c}">${t==='key'?'⭐':t}</span>`;}
function tagBtn(t,active){const c=TAG_COLORS[t]||'#475569';return`<button class="tag-btn" onclick="toggleTag(${expanded},'${t}')" style="${active?`background:${c}33;color:${c};border-color:${c}55`:''}">${t==='key'?'⭐ key':t}</button>`;}

async function generateMessage(id){
  if(!apiKey){alert('Please add your Anthropic API key in ⚙ Settings first.');return;}
  const c=contacts.find(x=>x.id===id);
  messages[id]='...';render();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`Write a short warm WhatsApp message to reach out to ${c.name}. Last note: "${c.lastNote||'No notes'}". Days since last contact: ${daysAgo(c.lastContact)}. Natural, genuine, 2-4 sentences, casual sign-off, no subject line.`}]})
    });
    const d=await res.json();
    messages[id]=d.content?.[0]?.text||'Could not generate.';
  }catch{messages[id]='Error. Check your API key in Settings.';}
  render();
}

function toggleExpand(id){expanded=expanded===id?null:id;editingNote=null;render();}
function toggleTag(id,t){const c=contacts.find(x=>x.id===id);c.tags=c.tags.includes(t)?c.tags.filter(x=>x!==t):[...c.tags,t];save();render();}
function markContacted(id){contacts.find(x=>x.id===id).lastContact=new Date().toISOString().split('T')[0];save();render();}
function updateFrequency(id,days){contacts.find(x=>x.id===id).reminderDays=parseInt(days);save();render();}
function deleteContact(id){if(!confirm('Delete this contact?'))return;contacts=contacts.filter(x=>x.id!==id);if(expanded===id)expanded=null;save();render();}
function saveNote(id){const ta=document.getElementById('note-ta');if(ta)contacts.find(x=>x.id===id).lastNote=ta.value;editingNote=null;save();render();}
function sendWA(id){const c=contacts.find(x=>x.id===id);const ta=document.getElementById(`msg-${id}`);const msg=ta?ta.value:(messages[id]||'');if(!msg.trim()){alert('Message is empty.');return;}window.open(`https://wa.me/${c.phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');}
function sendOwnWA(id){const c=contacts.find(x=>x.id===id);const ta=document.getElementById(`own-${id}`);const msg=ta?ta.value.trim():'';if(!msg){alert('Please type a message first.');return;}window.open(`https://wa.me/${c.phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');}

async function importContacts(){
  if(!('contacts' in navigator&&'ContactsManager' in window)){alert('Contact picker is only available in Safari on iOS 14.5+.\n\nMake sure you\'ve installed this app via "Add to Home Screen" in Safari.');return;}
  try{
    const sel=await navigator.contacts.select(['name','tel'],{multiple:true});
    let added=0;
    sel.forEach(c=>{
      const name=c.name?.[0]||'Unknown';
      const phone=c.tel?.[0]||'';
      if(!phone)return;
      if(!contacts.some(x=>x.phone===phone||x.name===name)){
        contacts.push({id:Date.now()+Math.random(),name,phone,tags:[],lastNote:'',lastContact:null,reminderDays:30});
        added++;
      }
    });
    save();alert(`Imported ${added} new contact${added!==1?'s':''}.`);render();
  }catch(e){if(e.name!=='AbortError')alert('Could not access contacts: '+e.message);}
}

function importFromFile(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.vcf,.csv';
  input.onchange=async e=>{
    const file=e.target.files[0];
    if(!file)return;
    const text=await file.text();
    let added=0;
    if(file.name.endsWith('.vcf')||text.startsWith('BEGIN:VCARD')){
      // Parse VCF
      const cards=text.split('BEGIN:VCARD').filter(c=>c.trim());
      cards.forEach(card=>{
        const nameLine=card.match(/FN[;:]([^\r\n]+)/);
        const telLine=card.match(/TEL[^:]*:([^\r\n]+)/);
        if(!nameLine||!telLine)return;
        const name=nameLine[1].trim();
        const phone=telLine[1].trim().replace(/\s/g,'');
        if(!phone)return;
        if(!contacts.some(x=>x.phone===phone||x.name===name)){
          contacts.push({id:Date.now()+Math.random(),name,phone,tags:[],lastNote:'',lastContact:null,reminderDays:30});
          added++;
        }
      });
    } else {
      // Parse CSV — expects columns: name, phone (flexible header matching)
      const lines=text.split('\n').filter(l=>l.trim());
      const headers=lines[0].toLowerCase().split(',').map(h=>h.trim().replace(/"/g,''));
      const nameIdx=headers.findIndex(h=>h.includes('name')||h.includes('first'));
      const phoneIdx=headers.findIndex(h=>h.includes('phone')||h.includes('tel')||h.includes('mobile'));
      if(nameIdx===-1||phoneIdx===-1){alert('CSV must have columns for name and phone/tel/mobile.');return;}
      lines.slice(1).forEach(line=>{
        const cols=line.split(',').map(c=>c.trim().replace(/"/g,''));
        const name=cols[nameIdx]||'';
        const phone=cols[phoneIdx]||'';
        if(!name||!phone)return;
        if(!contacts.some(x=>x.phone===phone||x.name===name)){
          contacts.push({id:Date.now()+Math.random(),name,phone,tags:[],lastNote:'',lastContact:null,reminderDays:30});
          added++;
        }
      });
    }
    save();alert(`Imported ${added} new contact${added!==1?'s':''}.`);render();
  };
  input.click();
}

function toggleFormTag(t){formTags=formTags.includes(t)?formTags.filter(x=>x!==t):[...formTags,t];renderFormTags();}
function renderFormTags(){
  const el=document.getElementById('form-tags');if(!el)return;
  el.innerHTML=['key','work','friend','family','client','mentor'].map(t=>{
    const a=formTags.includes(t);const c=TAG_COLORS[t]||'#475569';
    return`<button class="tag-btn" onclick="toggleFormTag('${t}')" style="${a?`background:${c}33;color:${c};border-color:${c}55`:''}">${t==='key'?'⭐ key':t}</button>`;
  }).join('');
}
function submitForm(){
  const name=document.getElementById('f-name').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  const note=document.getElementById('f-note').value.trim();
  const days=parseInt(document.getElementById('f-days').value)||30;
  if(!name||!phone){alert('Name and phone are required.');return;}
  contacts.push({id:Date.now(),name,phone,tags:[...formTags],lastNote:note,lastContact:null,reminderDays:days});
  formTags=[];showForm=false;save();render();
}

async function requestNotifications(){
  if(!('Notification' in window)){alert('Notifications require Safari on iOS 16.4+ with the app installed via Add to Home Screen.');return;}
  const result=await Notification.requestPermission();
  notifPermission=result;localStorage.setItem('wa-notif',result);
  if(result==='granted'){scheduleCheck();alert('Notifications enabled! You\'ll be reminded for overdue contacts each time you open the app.');}
  else alert('Permission denied. Enable in iPhone Settings → Apps → Safari → Notifications.');
  render();
}
function scheduleCheck(){checkReminders();localStorage.setItem('wa-last-check',Date.now());}
function checkReminders(){
  if(!navigator.serviceWorker?.controller)return;
  navigator.serviceWorker.controller.postMessage({type:'CHECK_REMINDERS',contacts});
}
function checkOnOpen(){
  const last=parseInt(localStorage.getItem('wa-last-check')||'0');
  if(notifPermission==='granted'&&Date.now()-last>1000*60*60*12)scheduleCheck();
}

function contactRowHTML(c){
  const isExp=expanded===c.id;
  const days=daysAgo(c.lastContact);
  const isKey=c.tags.includes('key');
  const dc=isKey?dotColor(days,c.reminderDays):'#334155';
  const msg=messages[c.id]||'';
  const notePH=c.lastNote?`"${c.lastNote}"`:c.phone;
  let expandHTML='';
  if(isExp){
    const tagsHTML=['key','work','friend','family','client','mentor'].map(t=>tagBtn(t,c.tags.includes(t))).join('');
    const freqHTML=isKey?`<div class="section-label">REMINDER FREQUENCY</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">
        ${[7,14,21,30,60,90].map(d=>`<button class="tag-btn" onclick="updateFrequency(${c.id},${d})"
          style="${c.reminderDays===d?'background:#6366f133;color:#818cf8;border-color:#6366f155':''}">
          ${d===7?'Weekly':d===14?'2 wks':d===21?'3 wks':d===30?'Monthly':d===60?'2 mo':'Quarterly'}</button>`).join('')}
      </div>`:'';
    const noteHTML=editingNote===c.id
      ?`<textarea id="note-ta" class="note-edit">${c.lastNote||''}</textarea>
        <div class="btn-row"><button class="btn btn-save" onclick="saveNote(${c.id})">Save</button>
        <button class="btn btn-cancel" onclick="editingNote=null;render()">Cancel</button></div>`
      :`<div class="note-box ${c.lastNote?'has-note':''}" onclick="editingNote=${c.id};render()">${c.lastNote||'Add a note...'}</div>`;

        Send on WhatsApp</button>`;
    const msgHTML=msg?`<div class="msg-box">
      <div class="msg-label">AI MESSAGE</div>
      <textarea class="msg-edit" id="msg-${c.id}">${msg==='...'?'Generating...':msg}</textarea>
      ${msg!=='...'?waBtn:''}
      </div>`:'';
    const ownMsgHTML=`<div class="msg-box" style="margin-top:8px">
      <div class="msg-label" style="color:#25D366">YOUR MESSAGE</div>
      <textarea class="msg-edit" id="own-${c.id}" placeholder="Type your own message here..."></textarea>
      <button class="btn-wa" onclick="sendOwnWA(${c.id})" style="background:#1a9e4a">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Send on WhatsApp</button>
      </div>`;
    expandHTML=`<div class="expand">
      <div class="section-label">TAGS</div><div class="tags-row">${tagsHTML}</div>
      ${freqHTML}
      <div class="section-label">LAST INTERACTION</div>${noteHTML}
      <div class="btn-row">
        <button class="btn btn-ai" onclick="generateMessage(${c.id})" ${msg==='...'?'disabled':''}>✨ ${msg==='...'?'Writing...':'AI Message'}</button>
        <button class="btn btn-contacted" onclick="markContacted(${c.id})">✓ Contacted</button>
        <button class="btn btn-delete" onclick="deleteContact(${c.id})">🗑</button>
      </div>${msgHTML}${ownMsgHTML}
    </div>`;
  }
  return`<div class="contact-wrap ${isExp?'open':''}" id="cw-${c.id}">
    <div class="contact-row" onclick="toggleExpand(${c.id})">
      <div class="avatar">${c.name[0]}</div>
      <div class="row-info">
        <div class="row-name">${c.name} ${c.tags.slice(0,2).map(t=>tagChip(t)).join('')}</div>
        <div class="row-sub">${notePH}</div>
      </div>
      <div class="row-right">
        <div class="dot" style="background:${dc}"></div>
        <span class="days-label">${c.lastContact?days+'d':'—'}</span>
        <span class="chevron">▾</span>
      </div>
    </div>${expandHTML}
  </div>`;
}

function setView(v){
  currentView=v;expanded=null;showForm=false;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{b.classList.toggle('active',['dashboard','contacts','settings'][i]===v);});
  render();
}

function render(){
  const body=document.getElementById('body');
  const filtered=contacts.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.tags.some(t=>t.includes(search.toLowerCase())));

  if(currentView==='settings'){
    const ns=notifPermission==='granted'?'✅ Enabled':notifPermission==='denied'?'🚫 Blocked':'⬜ Not set up';
    body.innerHTML=`
      <div id="settings-panel">
        <h3>🔔 Push Notifications</h3>
        <p>Get notified when it's time to reach out to a key contact.<br>Requires iOS 16.4+ with the app installed via <strong>Add to Home Screen</strong> in Safari.</p>
        <p>Status: <strong style="color:#f1f5f9">${ns}</strong></p>
        ${notifPermission==='granted'
          ?`<button class="btn btn-contacted" onclick="checkReminders()" style="width:100%">🔔 Test — Check Now</button>`
          :notifPermission==='denied'
          ?`<p style="color:#ef4444">Go to iPhone Settings → Apps → Safari → [your app] → Notifications → Allow</p>`
          :`<button class="btn btn-save" onclick="requestNotifications()" style="width:100%">Enable Notifications</button>`}
      </div>
      <div id="settings-panel">
        <h3>🔑 Anthropic API Key</h3>
        <p>Required for AI message generation. Free at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
        <input class="form-input" id="api-key-input" type="password" placeholder="sk-ant-..." value="${apiKey}" style="margin-bottom:8px"/>
        <button class="btn btn-save" onclick="saveKey()" style="width:100%">Save Key</button>
      </div>
      <div id="settings-panel">
        <h3>📱 Install as iPhone App</h3>
        <p>1. Open this URL in <strong>Safari</strong> on your iPhone<br>2. Tap the Share button (box with arrow ↗) at the bottom<br>3. Scroll down and tap <strong>"Add to Home Screen"</strong><br>4. Tap <strong>Add</strong> — it now lives on your home screen!</p>
      </div>`;
    return;
  }

  if(currentView==='dashboard'){
    const overdue=contacts.filter(c=>c.tags.includes('key')&&daysAgo(c.lastContact)>=c.reminderDays);
    const upcoming=contacts.filter(c=>c.tags.includes('key')&&daysAgo(c.lastContact)>=c.reminderDays*0.75&&daysAgo(c.lastContact)<c.reminderDays);
    let html=`<div class="dash-title">Follow-up Reminders</div><div class="dash-sub">Key contacts that need attention</div>`;
    if(!overdue.length&&!upcoming.length)html+=`<div class="empty">🎉<br><br>All caught up!</div>`;
    if(overdue.length)html+=`<div class="section-header"><div class="dot" style="background:#ef4444"></div><span style="color:#ef4444">OVERDUE</span></div>${overdue.map(contactRowHTML).join('')}`;
    if(upcoming.length)html+=`<div class="section-header" style="margin-top:12px"><div class="dot" style="background:#f59e0b"></div><span style="color:#f59e0b">DUE SOON</span></div>${upcoming.map(contactRowHTML).join('')}`;
    body.innerHTML=html;return;
  }

  let html=`<div class="search-row">
    <input class="search" placeholder="Search…" value="${search}" oninput="search=this.value;render()"/>
    <button class="btn-import" onclick="importContacts()">📱 Import</button>
    <button class="btn-import" onclick="importFromFile()" style="background:#6366f122;border-color:#6366f144;color:#818cf8">📂 File</button>
    <button class="btn-add" onclick="showForm=!showForm;render()">+</button>
  </div>`;
  if(showForm){
    html+=`<div class="form-card">
      <div class="form-title">NEW CONTACT</div>
      ${[['Name','f-name','text'],['Phone (with country code)','f-phone','tel'],['Last interaction note','f-note','text'],['Remind every (days)','f-days','number']].map(([l,id,t])=>`
        <div class="form-field"><div class="form-label">${l}</div>
        <input class="form-input" id="${id}" type="${t}" ${id==='f-days'?'value="30"':''}></div>`).join('')}
      <div class="form-field"><div class="form-label">TAGS</div><div class="tags-row" id="form-tags"></div></div>
      <div class="btn-row">
        <button class="btn btn-save" onclick="submitForm()" style="flex:1">Add Contact</button>
        <button class="btn btn-cancel" onclick="showForm=false;render()">Cancel</button>
      </div>
    </div>`;
  }
  html+=filtered.length?filtered.map(contactRowHTML).join(''):`<div class="empty">No contacts found</div>`;
  body.innerHTML=html;
  if(showForm)renderFormTags();
}

function saveKey(){apiKey=document.getElementById('api-key-input').value.trim();localStorage.setItem('wa-crm-apikey',apiKey);alert('API key saved!');}

if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');
document.getElementById('contact-count').textContent=contacts.length+' contacts';
checkOnOpen();
render();
</script>
</body>
</html>
